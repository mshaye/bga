<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6 Nimmt! Card Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "IBM Plex Sans", sans-serif;
    background: #f5f4f0;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 1.5rem 1rem 3rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .inner {
    width: 100%;
    max-width: 1000px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .stats-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
    width: 100%;
    justify-content: center;
  }

  .stats-pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .stat-pill {
    background: #fff;
    border: 0.5px solid #d0cfc9;
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 22px;
    color: #555;
    font-family: "IBM Plex Sans", sans-serif;
  }

  .stat-pill span {
    font-weight: 600;
    color: #1a1a1a;
  }

  .phase-label {
    font-size: 18px;
    font-weight: 600;
    color: #b8860b;
    padding: 6px 4px;
  }

  .action-btn {
    background: #fff;
    border: 0.5px solid #d0cfc9;
    border-radius: 8px;
    padding: 7px 16px;
    font-size: 22px;
    color: #333;
    font-family: "IBM Plex Sans", sans-serif;
    transition: background 0.1s;
    cursor: pointer;
  }
  .action-btn:hover { background: #eeecea; }

  .start-btn {
    background: #b8860b;
    border: 1.5px solid #8b6508;
    color: #fff;
    border-radius: 8px;
    padding: 7px 20px;
    font-size: 22px;
    font-family: "IBM Plex Sans", sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.1s;
  }
  .start-btn:hover { background: #9a7009; }
  .start-btn:disabled { opacity: 0.4; cursor: default; }

  .row-wrap {
    display: flex;
    align-items: flex-start;
    gap: 4px;
    margin-bottom: 5px;
  }

  .cards-flex {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .card-btn {
    width: 60px;
    height: 76px;
    border-radius: 6px;
    border: 1.5px solid transparent;
    cursor: pointer;
    font-family: "IBM Plex Sans", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    transition: opacity 0.1s, transform 0.08s;
    position: relative;
    user-select: none;
  }

  .card-btn:active { transform: scale(0.95); }

  .card-num {
    font-size: 22px;
    font-weight: 600;
    line-height: 1;
  }

  .card-bull {
    font-size: 15px;
    line-height: 1;
    font-weight: 500;
  }

  /* Bull-count colours */
  .b1 { background: #fff; border-color: #ccc; color: #222; }
  .b1 .card-bull { color: #999; }

  .b2 { background: #dbeafe; border-color: #93c5fd; color: #1e3a5f; }
  .b2 .card-bull { color: #3b82f6; }

  .b3 { background: #dcfce7; border-color: #86efac; color: #14532d; }
  .b3 .card-bull { color: #16a34a; }

  .b5 { background: #fee2e2; border-color: #fca5a5; color: #7f1d1d; }
  .b5 .card-bull { color: #ef4444; }

  .b7 { background: #ffedd5; border-color: #fdba74; color: #7c2d12; }
  .b7 .card-bull { color: #f97316; }

  #c55 { background: #ff5500; border-color: #cc3300; color: #fff; box-shadow: 0 0 0 2px #ff5500; }
  #c55 .card-bull { color: #ffe0cc; }

  /* My hand — gold */
  .card-btn.in-hand {
    background: #ffd700 !important;
    border-color: #b8860b !important;
    color: #3b2a00 !important;
    box-shadow: 0 0 0 2px #ffd700;
  }
  .card-btn.in-hand .card-bull { color: #7a5c00 !important; }

  /* Played */
  .card-btn.played { opacity: 0.1; }
</style>
</head>
<body>
<div class="inner">

  <div class="stats-bar">
    <div class="stats-pills" id="pills">
      <!-- filled by JS -->
    </div>
  </div>

  <div id="grid"></div>

</div>
<script>
const BULL_OVERRIDES = {
  55: 7,
  11: 5, 22: 5, 33: 5, 44: 5, 66: 5, 77: 5, 88: 5, 99: 5,
  10: 3, 20: 3, 30: 3, 40: 3, 50: 3, 60: 3, 70: 3, 80: 3, 90: 3, 100: 3
};

function bulls(n) {
  if (BULL_OVERRIDES[n]) return BULL_OVERRIDES[n];
  if (n % 10 === 5) return 2;
  return 1;
}

// Phases: 'setup' | 'round'
let phase = 'setup';
const myHand = new Set();
const played = new Set();
const cardBulls = {};

function updateStats() {
  const pills = document.getElementById('pills');
  if (phase === 'setup') {
    pills.innerHTML = `
      <span class="phase-label">Select your 10 cards&nbsp;(<span id="hand-count">${myHand.size}</span>/10)</span>
      <button class="start-btn" id="start-btn" onclick="startRound()" ${myHand.size === 10 ? '' : 'disabled'}>Start round</button>
      <button class="action-btn" onclick="resetAll()">↺ Reset</button>
    `;
  } else {
    pills.innerHTML = `
      <div class="stat-pill">Played: <span>${played.size}</span> / 64</div>
      <div class="stat-pill">Remaining: <span>${64 - played.size}</span></div>
      <button class="action-btn" onclick="resetAll()">↺ Reset</button>
    `;
  }
}

function startRound() {
  if (myHand.size !== 10) return;
  phase = 'round';
  updateStats();
}

function resetAll() {
  phase = 'setup';
  myHand.clear();
  played.clear();
  document.querySelectorAll('.card-btn').forEach(b => {
    b.classList.remove('played', 'in-hand');
  });
  updateStats();
}

function toggle(n) {
  const btn = document.getElementById('c' + n);

  if (phase === 'setup') {
    if (myHand.has(n)) {
      myHand.delete(n);
      btn.classList.remove('in-hand');
    } else {
      if (myHand.size >= 10) return;
      myHand.add(n);
      btn.classList.add('in-hand');
    }
    updateStats();
    return;
  }

  // Round phase
  if (played.has(n)) {
    played.delete(n);
    btn.classList.remove('played');
    // restore hand highlight if it was in hand
    if (myHand.has(n)) btn.classList.add('in-hand');
  } else {
    played.add(n);
    btn.classList.remove('in-hand');
    btn.classList.add('played');
  }
  updateStats();
}

// Build grid
const container = document.getElementById('grid');
const ROW_SIZE = 13;

for (let row = 0; row < 8; row++) {
  const start = row * ROW_SIZE + 1;
  const end = Math.min(start + ROW_SIZE - 1, 104);

  const rowDiv = document.createElement('div');
  rowDiv.className = 'row-wrap';

  const flex = document.createElement('div');
  flex.className = 'cards-flex';

  for (let n = start; n <= end; n++) {
    const b = bulls(n);
    cardBulls[n] = b;

    const btn = document.createElement('button');
    btn.className = 'card-btn b' + b;
    btn.id = 'c' + n;
    btn.title = 'Card ' + n + ' — ' + b + ' bull' + (b > 1 ? 's' : '');
    btn.onclick = () => toggle(n);

    const numEl = document.createElement('span');
    numEl.className = 'card-num';
    numEl.textContent = n;

    const bullEl = document.createElement('span');
    bullEl.className = 'card-bull';
    bullEl.textContent = b + '♦';

    btn.appendChild(numEl);
    btn.appendChild(bullEl);
    flex.appendChild(btn);
  }

  rowDiv.appendChild(flex);
  container.appendChild(rowDiv);
}

updateStats();
</script>
</body>
</html>
